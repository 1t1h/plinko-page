<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Plinko Mechanics</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            user-select: none;
        }
        body {
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        h1 {
            font-size: 1.6rem;
            color: #38bdf8;
            margin-bottom: 15px;
            text-align: center;
        }
        .game-layout {
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 750px;
            gap: 15px;
        }
        @media (min-width: 600px) {
            .game-layout {
                flex-direction: row;
            }
        }
        .control-board {
            background-color: #1e293b;
            border-radius: 10px;
            padding: 15px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }
        .wallet-card {
            background-color: #0f172a;
            border: 1px solid #334155;
            border-radius: 6px;
            padding: 10px;
            text-align: center;
        }
        .wallet-amount {
            color: #4ade80;
            font-size: 1.4rem;
            font-weight: bold;
            margin-top: 2px;
        }
        .wager-row {
            display: flex;
            gap: 5px;
        }
        input {
            flex: 1;
            background-color: #0f172a;
            border: 1px solid #334155;
            color: #f8fafc;
            padding: 8px;
            border-radius: 6px;
            outline: none;
            font-size: 1rem;
        }
        button {
            background-color: #334155;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }
        button:active {
            opacity: 0.8;
        }
        .drop-btn {
            background-color: #e11d48;
            padding: 12px;
            font-size: 1.1rem;
            border-radius: 6px;
            text-transform: uppercase;
        }
        .arena-frame {
            flex: 1.4;
            background-color: #0b0f19;
            border: 2px solid #334155;
            border-radius: 10px;
            max-width: 400px;
            width: 100%;
            align-self: center;
        }
        canvas {
            display: block;
            width: 100%;
            height: auto;
            aspect-ratio: 4 / 5;
        }
    </style>
</head>
<body>

    <h1>Plinko Physics Engine</h1>

    <div class="game-layout">
        <div class="control-board">
            <div class="wallet-card">
                <div style="color: #94a3b8; font-size: 0.75rem; letter-spacing: 0.05em;">BALANCE</div>
                <div class="wallet-amount" id="balanceDisplay">$1000.00</div>
            </div>
            
            <div class="wager-row">
                <input type="number" id="betValue" value="10" min="1">
                <button id="halfBtn">½</button>
                <button id="doubleBtn">2×</button>
            </div>

            <button class="drop-btn" id="triggerDrop">Drop Ball</button>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px; font-size: 0.8rem; text-align: center;">
                <div class="wallet-card">Drops: <span id="countDrops" style="font-weight: bold;">0</span></div>
                <div class="wallet-card">Max Win: <span id="countMaxWin" style="font-weight: bold; color: #eab308;">0x</span></div>
            </div>
        </div>

        <div class="arena-frame">
            <canvas id="canvasBoard"></canvas>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvasBoard');
        const ctx = canvas.getContext('2d');
        canvas.width = 400;
        canvas.height = 500;

        let bankroll = 1000;
        let dropCount = 0;
        let peakMultiplier = 0;
        let obstaclePegs = [];
        let runningBalls = [];

        const indexMultipliers = [10, 4, 1.5, 0.5, 0.2, 0.2, 0.5, 1.5, 4, 10];
        const indexColors = ['#ef4444', '#f97316', '#eab308', '#84cc16', '#10b981', '#10b981', '#84cc16', '#eab308', '#f97316', '#ef4444'];

        // Build absolute equilateral triangular pin grid array
        for (let r = 0; r < 9; r++) {
            let dotsInRow = r + 3;
            let horizontalSpacing = canvas.width / (dotsInRow + 1);
            for (let i = 0; i < dotsInRow; i++) {
                obstaclePegs.push({
                    x: horizontalSpacing * (i + 1),
                    y: 90 + r * 36
                });
            }
        }

        function runtimeTick() {
            ctx.clearRect(0, 0, 400, 500);

            // Draw rigid pin grid elements
            ctx.fillStyle = '#64748b';
            obstaclePegs.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, 4, 0, Math.PI * 2);
                ctx.fill();
            });

            // Draw base drop score zones
            let slotWidth = 400 / indexMultipliers.length;
            indexMultipliers.forEach((m, idx) => {
                ctx.fillStyle = indexColors[idx];
                ctx.fillRect(idx * slotWidth + 1, 465, slotWidth - 2, 35);
                
                ctx.fillStyle = '#0f172a';
                ctx.font = 'bold 10px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText(m + 'x', idx * slotWidth + slotWidth / 2, 486);
            });

            // Iterate moving vector bodies
            for (let i = runningBalls.length - 1; i >= 0; i--) {
                let b = runningBalls[i];
                b.vy += 0.16; // gravity coefficient acceleration constant
                b.x += b.vx;
                b.y += b.vy;

                // Restrict cross bounds wall collisions
                if (b.x < 7) { b.x = 7; b.vx *= -0.4; }
                if (b.x > 393) { b.x = 393; b.vx *= -0.4; }

                // Check radial collision thresholds against pins
                obstaclePegs.forEach(p => {
                    let distanceX = b.x - p.x;
                    let distanceY = b.y - p.y;
                    let totalDistance = Math.sqrt(distanceX * distanceX + distanceY * distanceY);

                    if (totalDistance < 10) {
                        let forcePush = 10 - totalDistance;
                        b.x += (distanceX / totalDistance) * forcePush;
                        b.y += (distanceY / totalDistance) * forcePush;

                        let directionalDot = b.vx * (distanceX / totalDistance) + b.vy * (distanceY / totalDistance);
                        b.vx = (b.vx - 2 * directionalDot * (distanceX / totalDistance)) * 0.45 + (Math.random() - 0.5) * 0.25;
                        b.vy = (b.vy - 2 * directionalDot * (distanceY / totalDistance)) * 0.45;
                    }
                });

                // Render individual particle body items
                ctx.beginPath();
                ctx.arc(b.x, b.y, 6, 0, Math.PI * 2);
                ctx.fillStyle = '#38bdf8';
                ctx.fill();

                // Check terminal index target boundaries
                if (b.y >= 465) {
                    let matchingColumn = Math.max(0, Math.min(indexMultipliers.length - 1, Math.floor(b.x / slotWidth)));
                    
                    bankroll += b.wager * indexMultipliers[matchingColumn];
                    dropCount++;
                    if (indexMultipliers[matchingColumn] > peakMultiplier) peakMultiplier = indexMultipliers[matchingColumn];

                    document.getElementById('balanceDisplay').textContent = '$' + bankroll.toFixed(2);
                    document.getElementById('countDrops').textContent = dropCount;
                    document.getElementById('countMaxWin').textContent = peakMultiplier + 'x';

                    runningBalls.splice(i, 1);
                }
            }

            requestAnimationFrame(runtimeTick);
        }

        document.getElementById('triggerDrop').addEventListener('click', () => {
            let stake = parseFloat(document.getElementById('betValue').value);
            if (isNaN(stake) || stake <= 0 || stake > bankroll) return;

            bankroll -= stake;
            document.getElementById('balanceDisplay').textContent = '$' + bankroll.toFixed(2);
            runningBalls.push({
                x: 200 + (Math.random() - 0.5) * 12,
                y: 20,
                vx: 0,
                vy: 0,
                wager: stake
            });
        });

        document.getElementById('halfBtn').addEventListener('click', () => {
            let inputField = document.getElementById('betValue');
            inputField.value = Math.max(1, Math.floor(parseFloat(inputField.value) / 2));
        });

        document.getElementById('doubleBtn').addEventListener('click', () => {
            let inputField = document.getElementById('betValue');
            inputField.value = Math.floor(parseFloat(inputField.value) * 2);
        });

        runtimeTick();
    </script>
</body>
</html>
