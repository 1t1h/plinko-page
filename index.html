<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Plinko</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; user-select: none; }
        body { background-color: #0f172a; color: white; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 10px; }
        h1 { font-size: 1.4rem; color: #38bdf8; margin: 10px 0; text-align: center; }
        .wrapper { display: flex; flex-direction: column; width: 100%; max-width: 700px; gap: 10px; }
        @media (min-width: 600px) { .wrapper { flex-direction: row; } }
        .sidebar { background: #1e293b; border-radius: 8px; padding: 15px; flex: 1; display: flex; flex-direction: column; gap: 10px; height: fit-content; }
        .card { background: #0f172a; border: 1px solid #334155; border-radius: 6px; padding: 8px; text-align: center; }
        .green-text { color: #4ade80; font-size: 1.3rem; font-weight: bold; }
        .row { display: flex; gap: 5px; }
        input { flex: 1; background: #0f172a; border: 1px solid #334155; color: white; padding: 8px; border-radius: 6px; font-size: 1rem; text-align: center; }
        button { background: #334155; color: white; border: none; padding: 8px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-main { background: #e11d48; padding: 12px; font-size: 1.1rem; text-transform: uppercase; width: 100%; }
        .board { flex: 1.3; background: #0b0f19; border: 2px solid #334155; border-radius: 8px; max-width: 360px; width: 100%; align-self: center; }
        canvas { display: block; width: 100%; height: auto; aspect-ratio: 4 / 5; }
    </style>
</head>
<body>

    <h1>Plinko Production Board</h1>

    <div class="wrapper">
        <div class="sidebar">
            <div class="card">
                <div style="color: #94a3b8; font-size: 0.75rem;">BANKROLL BALANCE</div>
                <div class="green-text" id="displayFunds">$1000.00</div>
            </div>
            
            <div class="row">
                <input type="number" id="wagerSize" value="10" min="1">
                <button id="halfAction">½</button>
                <button id="doubleAction">2×</button>
            </div>

            <button class="btn-main" id="dropTrigger">Drop Ball</button>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 5px; font-size: 0.75rem;">
                <div class="card">Drops: <span id="countD" style="font-weight:bold;">0</span></div>
                <div class="card">Max Win: <span id="countM" style="font-weight:bold; color:#eab308;">0x</span></div>
            </div>
        </div>

        <div class="board">
            <canvas id="mainViewCanvas"></canvas>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('mainViewCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 400;
        canvas.height = 500;

        let currentMoney = 1000;
        let runningDropCount = 0;
        let topMultiplierValue = 0;
        let staticPins = [];
        let physicsItems = [];

        const payoutRatios = [3, 2, 1, 0.2, 0.2, 0.2, 0.2, 1, 2, 3];
        const displayColors = ['#ef4444', '#f97316', '#eab308', '#84cc16', '#10b981', '#10b981', '#84cc16', '#eab308', '#f97316', '#ef4444'];

        // Map symmetric coordinate peg tracking points
        for (let r = 0; r < 9; r++) {
            let columnCount = r + 3;
            let spacingOffset = canvas.width / (columnCount + 1);
            for (let i = 0; i < columnCount; i++) {
                staticPins.push({ x: spacingOffset * (i + 1), y: 90 + r * 35 });
            }
        }

        function engineFrameLoop() {
            ctx.clearRect(0, 0, 400, 500);

            // Draw peg nodes
            ctx.fillStyle = '#64748b';
            staticPins.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, 4, 0, Math.PI * 2);
                ctx.fill();
            });

            // Draw multi target columns
            let partitionWidth = 400 / payoutRatios.length;
            payoutRatios.forEach((m, i) => {
                ctx.fillStyle = displayColors[i];
                ctx.fillRect(i * partitionWidth + 1, 465, partitionWidth - 2, 35);
                ctx.fillStyle = '#0f172a';
                ctx.font = 'bold 10px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText(m + 'x', i * partitionWidth + partitionWidth / 2, 486);
            });

            // Process dynamic item transformations
            for (let i = physicsItems.length - 1; i >= 0; i--) {
                let ball = physicsItems[i];
                ball.vy += 0.15; // smooth trajectory acceleration constant
                ball.x += ball.vx;
                ball.y += ball.vy;

                if (ball.x < 7) { ball.x = 7; ball.vx *= -0.4; }
                if (ball.x > 393) { ball.x = 393; b.vx *= -0.4; }

                staticPins.forEach(p => {
                    let dx = ball.x - p.x;
                    let dy = ball.y - p.y;
                    let range = Math.sqrt(dx * dx + dy * dy);
                    if (range < 10) {
                        ball.x += (dx / range) * (10 - range);
                        ball.y += (dy / range) * (10 - range);
                        let velocityDot = ball.vx * (dx / range) + ball.vy * (dy / range);
                        ball.vx = (ball.vx - 2 * velocityDot * (dx / range)) * 0.4 + (Math.random() - 0.5) * 0.2;
                        ball.vy = (ball.vy - 2 * velocityDot * (dy / range)) * 0.4;
                    }
                });

                ctx.beginPath();
                ctx.arc(ball.x, ball.y, 6, 0, Math.PI * 2);
                ctx.fillStyle = '#38bdf8';
                ctx.fill();

                if (ball.y >= 465) {
                    let targetIndex = Math.max(0, Math.min(payoutRatios.length - 1, Math.floor(ball.x / partitionWidth)));
                    currentMoney += ball.amt * payoutRatios[targetIndex];
                    runningDropCount++;
                    if (payoutRatios[targetIndex] > topMultiplierValue) topMultiplierValue = payoutRatios[targetIndex];

                    document.getElementById('displayFunds').textContent = '$' + currentMoney.toFixed(2);
                    document.getElementById('countD').textContent = runningDropCount;
                    document.getElementById('countM').textContent = topMultiplierValue + 'x';

                    physicsItems.splice(i, 1);
                }
            }
            requestAnimationFrame(engineFrameLoop);
        }

        document.getElementById('dropTrigger').addEventListener('click', () => {
            let numericBet = parseFloat(document.getElementById('wagerSize').value);
            if (isNaN(numericBet) || numericBet <= 0 || numericBet > currentMoney) return;

            currentMoney -= numericBet;
            document.getElementById('displayFunds').textContent = '$' + currentMoney.toFixed(2);
            physicsItems.push({ x: 200 + (Math.random() - 0.5) * 10, y: 25, vx: 0, vy: 0, amt: numericBet });
        });

        document.getElementById('halfAction').addEventListener('click', () => {
            let el = document.getElementById('wagerSize');
            el.value = Math.max(1, Math.floor(parseFloat(el.value) / 2));
        });

        document.getElementById('doubleAction').addEventListener('click', () => {
            let el = document.getElementById('wagerSize');
            el.value = Math.floor(parseFloat(el.value) * 2);
        });

        engineFrameLoop();
    </script>
</body>
</html>
